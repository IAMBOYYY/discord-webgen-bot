name: Keep Render Bot Awake

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes
  workflow_dispatch:         # allows manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render service
        run: |
          curl -s -o /dev/null -w "%{http_code}" ${{ secrets.RENDER_URL }}/health
